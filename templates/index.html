<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }
        .calculator {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .calculator input {
            margin: 10px 0;
            padding: 10px;
            width: 80%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .calculator button {
            margin: 5px;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
        .calculator button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            font-size: 1.2em;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>Calculator</h1>
        <input type="number" id="numberA" placeholder="Enter number A">
        <input type="number" id="numberB" placeholder="Enter number B">
        <div>
            <button onclick="performOperation('add')">Add</button>
            <button onclick="performOperation('subtract')">Subtract</button>
            <button onclick="performOperation('multiply')">Multiply</button>
            <button onclick="performOperation('divide')">Divide</button>
            <button onclick="performOperation('exponent')">Exponent</button>
        </div>
        <div class="result" id="result"></div>
    </div>
    <script>
        async function performOperation(operation) {
            const numberA = document.getElementById('numberA').value;
            const numberB = document.getElementById('numberB').value;

            if (!numberA || !numberB) {
                document.getElementById('result').innerText = 'Please enter both numbers.';
                return;
            }

            try {
                const response = await fetch(`/${operation}/?a=${numberA}&b=${numberB}`);
                const data = await response.json();

                if (response.ok) {
                    document.getElementById('result').innerText = `Result: ${data.result}`;
                } else {
                    document.getElementById('result').innerText = `Error: ${data.error}`;
                }
            } catch (error) {
                document.getElementById('result').innerText = 'An error occurred. Please try again.';
            }
        }
    </script>
</body>
</html>
